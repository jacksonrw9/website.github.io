<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phizzle Interactive Booth</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-card: #436C79;
    --bg-card-hover: #3a5e6a;
    --text-dark: #30444D;
    --text-body: #4a6a75;
    --text-white: #ffffff;
  }

  html, body {
    width: 100%; height: 100%;
    font-family: 'Lato', sans-serif;
    background: #c8dde4;
    background-image: url('https://res.cloudinary.com/dqiggfeuq/image/upload/q_auto/f_auto/v1776357718/wavy-4K_ydrqeh.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color: var(--text-dark);
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    cursor: default;
  }

  /* === LAYOUT === */
  .dashboard {
    width: 100%; height: 100%;
    display: grid;
    grid-template-columns: 2fr 1fr;
    grid-template-rows: 1fr;
    padding: 40px 30px 40px 30px;
    gap: 0;
  }

  /* === LEFT COLUMN === */
  .left-column {
    grid-column: 1;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    padding-right: 40px;
    min-height: 0;
  }

  /* === LOGO === */
  .logo-area {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    flex-shrink: 0;
  }
  .logo-area img {
    height: 100px;
    width: auto;
  }

  /* === RIGHT COLUMN === */
  .right-column {
    grid-column: 2;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
    min-height: 0;
  }
  .right-column h2 {
    font-size: 52px;
    font-weight: 900;
    color: var(--text-dark);
    text-align: center;
    padding: 16px 0;
    flex-shrink: 0;
  }

  /* === VIDEO SECTION === */
  .video-area {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 0;
    flex: 1;
  }
  .video-container {
    width: 100%;
    max-height: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 16px;
    overflow: hidden;
    background: #1a3a4a;
    border: 6px solid #436C79;
    position: relative;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    cursor: pointer;
  }
  .local-video {
    width: 100%; height: 100%; border: none;
    object-fit: cover;
    object-position: center;
    display: block;
    position: absolute;
    inset: 0;
  }
  .play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100px;
    height: 100px;
    cursor: pointer;
    z-index: 3;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.3));
    transition: transform 0.25s ease;
  }
  .play-btn:hover {
    transform: translate(-50%, -50%) scale(1.08);
  }
  .video-container.playing .play-btn,
  .video-container.playing .video-thumbnail {
    display: none;
  }
  .video-container.playing.paused .play-btn {
    display: block;
  }
  .video-thumbnail {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }
  .pause-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100px;
    height: 100px;
    cursor: pointer;
    z-index: 3;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.3));
    transition: transform 0.25s ease, opacity 0.3s ease;
    display: none;
    opacity: 0;
  }
  .pause-btn:hover {
    transform: translate(-50%, -50%) scale(1.08);
  }
  .video-container.playing .pause-btn {
    display: none;
  }
  .video-container.playing.paused .pause-btn {
    display: none;
  }
  .rewind-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(calc(-50% - 110px), -50%);
    width: 60px;
    height: 60px;
    cursor: pointer;
    z-index: 3;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    transition: transform 0.25s ease, opacity 0.3s ease;
    display: none;
    opacity: 0;
  }
  .rewind-btn:hover {
    transform: translate(calc(-50% - 110px), -50%) scale(1.1);
  }
  .video-container.playing .rewind-btn {
    display: none;
  }
  .video-container.playing.paused .rewind-btn {
    display: block;
    opacity: 1;
  }
  .expand-btn {
    position: absolute;
    bottom: 16px;
    right: 16px;
    width: 44px;
    height: 44px;
    cursor: pointer;
    z-index: 3;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    display: none;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .expand-btn:hover {
    opacity: 1;
  }
  .video-container.playing .expand-btn {
    display: block;
  }
  .video-label-below {
    font-family: 'Lato', sans-serif;
    font-size: 52px;
    font-weight: 900;
    color: var(--text-dark);
    padding: 16px 0 0 0;
    text-align: center;
  }

  /* === WIDGETS AREA === */
  .widgets-area {
    display: grid;
    grid-template-rows: 1fr 1fr 1fr 1fr;
    gap: 20px;
    min-height: 0;
    flex: 1;
  }

  .widget-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 0;
    flex: 1;
  }

  .widget-card {
    border-radius: 16px;
    background: var(--bg-card);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    transition: background 0.3s ease, transform 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    height: 85%;
  }
  .widget-card:hover {
    background: var(--bg-card-hover);
  }
  .widget-card:active {
    transform: scale(0.97);
  }
  .widget-title {
    font-weight: 700;
    font-size: 30px;
    color: var(--text-white);
    letter-spacing: 0.3px;
  }
  .widget-desc {
    font-size: 16px;
    color: var(--text-body);
    line-height: 1.5;
    padding: 0 8px;
    text-align: center;
  }

  /* === FULLSCREEN MODAL === */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(5,34,57,0.92);
    backdrop-filter: blur(24px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .modal-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .modal-panel {
    width: 88vw;
    height: 82vh;
    border-radius: 28px;
    background: #f0f5f7;
    border: 1px solid rgba(67,108,121,0.2);
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    padding: 36px 48px;
    display: flex;
    flex-direction: column;
    position: relative;
    transform: scale(0.92);
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    overflow-y: auto;
  }
  .modal-overlay.active .modal-panel {
    transform: scale(1);
  }

  .modal-close {
    position: absolute;
    top: 24px; right: 24px;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--bg-card);
    border: none;
    color: white;
    font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    z-index: 2;
  }
  .modal-close:hover {
    background: var(--bg-card-hover);
  }

  .modal-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--bg-card);
    border: none;
    color: white;
    font-size: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    z-index: 1001;
  }
  .modal-nav:hover {
    background: var(--bg-card-hover);
  }
  .modal-nav.prev { left: 16px; }
  .modal-nav.next { right: 16px; }

  .modal-indicator {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 1001;
  }
  .modal-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transition: all 0.3s ease;
  }
  .modal-dot.active {
    background: white;
    box-shadow: 0 0 8px rgba(255,255,255,0.5);
  }

  .modal-title {
    font-weight: 900;
    font-size: 38px;
    color: var(--text-dark);
    margin-bottom: 0;
  }
  .modal-subtitle {
    font-size: 26px;
    color: #446c7a;
    font-weight: 700;
    letter-spacing: 0;
    margin-bottom: 0;
  }
  .modal-body {
    font-size: 23px;
    line-height: 1.8;
    color: var(--text-body);
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .modal-body h3 {
    font-size: 26px;
    font-weight: 700;
    color: var(--text-dark);
    margin: 28px 0 12px;
  }
  .modal-body h3:first-child { margin-top: 0; }
  .modal-body ul {
    list-style: disc;
    padding: 0 0 0 24px; margin: 10px 0;
  }
  .modal-body ul li {
    padding: 6px 0;
    font-size: 21px;
  }

  /* === ANIMATIONS === */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .anim-in {
    animation: fadeInUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }
  .anim-d1 { animation-delay: 0.1s; }
  .anim-d2 { animation-delay: 0.2s; }
  .anim-d3 { animation-delay: 0.3s; }
  .anim-d4 { animation-delay: 0.4s; }
  .anim-d5 { animation-delay: 0.5s; }
  .anim-d6 { animation-delay: 0.6s; }
</style>
</head>
<body>

<div class="dashboard">
  <div class="left-column">
    <!-- Logo -->
    <div class="logo-area anim-in anim-d1">

</div>

<!-- Fullscreen Modal -->

  let currentSlide = 0;

  function renderModal() {
    const data = slides[currentSlide];
    document.getElementById('modalContent').style.cssText = 'display:flex;flex-direction:column;flex:1;min-height:0;';
    document.getElementById('modalContent').innerHTML = `
      <div class="modal-title">${data.title}</div>
      <div class="modal-subtitle">${data.subtitle}</div>
      <div class="modal-body">${data.body}</div>
    `;
    const dots = document.getElementById('modalDots');
    dots.innerHTML = slides.map((_, i) =>
      `<div class="modal-dot ${i === currentSlide ? 'active' : ''}"></div>`
    ).join('');
    document.querySelector('.modal-nav.prev').style.display = currentSlide === 0 ? 'none' : 'flex';
    document.querySelector('.modal-nav.next').style.display = currentSlide === slides.length - 1 ? 'none' : 'flex';
  }

  function openModal(index) {
    currentSlide = index;
    renderModal();
    document.getElementById('modalOverlay').classList.add('active');
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('modalOverlay') && e.type === 'click') return;
    document.getElementById('modalOverlay').classList.remove('active');
  }

  function navModal(dir) {
    currentSlide = (currentSlide + dir + slides.length) % slides.length;
    renderModal();
  }

  document.addEventListener('keydown', (e) => {
    if (!document.getElementById('modalOverlay').classList.contains('active')) return;
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowLeft') navModal(-1);
    if (e.key === 'ArrowRight') navModal(1);
  });

  function toggleVideo() {
    const container = document.getElementById('videoContainer');
    const video = document.getElementById('localVideo');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    if (!container.classList.contains('playing')) {
      // Start playing
      container.classList.add('playing');
      container.classList.remove('paused');
      video.controls = false;
      video.currentTime = 0;
      video.play();
    } else if (video.paused) {
      // Resume
      container.classList.remove('paused');
      video.play();
    } else {
      // Pause
      container.classList.add('paused');
      video.pause();
    }
  }

  function rewindVideo() {
    const video = document.getElementById('localVideo');
    video.currentTime = Math.max(0, video.currentTime - 10);
  }

  function expandVideo() {
    const video = document.getElementById('localVideo');
    const expandedVideo = document.getElementById('expandedVideo');
    const overlay = document.getElementById('videoModalOverlay');
    
    expandedVideo.currentTime = video.currentTime;
    overlay.style.opacity = '1';
    overlay.style.pointerEvents = 'all';
    expandedVideo.play();
    video.pause();
  }

  function closeVideoModal() {
    const video = document.getElementById('localVideo');
    const expandedVideo = document.getElementById('expandedVideo');
    const overlay = document.getElementById('videoModalOverlay');
    
    video.currentTime = expandedVideo.currentTime;
    overlay.style.opacity = '0';
    overlay.style.pointerEvents = 'none';
    expandedVideo.pause();
    video.play();
    document.getElementById('videoContainer').classList.remove('paused');
  }

  document.getElementById('localVideo').addEventListener('ended', function() {
    const container = document.getElementById('videoContainer');
    container.classList.remove('playing');
    container.classList.remove('paused');
    this.currentTime = 0;
  });

  // Scale dashboard to fit any screen size
  // Designed at 1920x1080 - scales proportionally
  function scaleDashboard() {
    const baseWidth = 1920;
    const baseHeight = 1080;
    const scaleX = window.innerWidth / baseWidth;
    const scaleY = window.innerHeight / baseHeight;
    const scale = Math.min(scaleX, scaleY);
    const dash = document.querySelector('.dashboard');
    dash.style.width = baseWidth + 'px';
    dash.style.height = baseHeight + 'px';
    dash.style.transform = `scale(${scale})`;
    dash.style.transformOrigin = 'top left';
    dash.style.position = 'absolute';
    dash.style.left = ((window.innerWidth - baseWidth * scale) / 2) + 'px';
    dash.style.top = ((window.innerHeight - baseHeight * scale) / 2) + 'px';
  }
  scaleDashboard();
  window.addEventListener('resize', scaleDashboard);
